map "$request_method:$uri" $pdf_upload_limit_key {
    default "";
    "POST:/api/tasks" $binary_remote_addr;
}

limit_conn_zone $pdf_upload_limit_key zone=pdf_upload_conn:10m;
limit_req_zone $pdf_upload_limit_key zone=pdf_upload_rate:10m rate=6r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;
    limit_conn pdf_upload_conn 3;
    limit_conn_status 429;
    limit_req zone=pdf_upload_rate burst=12 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header oai-authenticated-user-email "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
